<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-fluid bg-gradient">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <div class="card shadow-lg border-0 rounded-3">
                        <div class="card-header bg-primary text-white text-center py-4">
                            <div class="d-flex justify-content-between align-items-center">
                                <div></div>
                                <div class="text-center">
                                    <h1 class="display-4 fw-bold mb-0">🌍 Student Grade Calculator</h1>
                                    <p class="mb-0">Calculate your academic performance with ease</p>
                                </div>
                                <div class="theme-toggle">
                                    <button class="btn btn-outline-light btn-sm" id="theme-toggle"
                                        title="Toggle Dark Mode">
                                        🌙
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body p-4">
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="text-muted mb-0">📚 Your Subjects</h5>
                                    <small class="text-muted d-none d-md-inline">
                                        <i class="fas fa-keyboard me-1"></i>
                                        <kbd>Ctrl+N</kbd> Add • <kbd>Ctrl+Enter</kbd> Calculate • <kbd>Ctrl+R</kbd>
                                        Reset
                                    </small>
                                </div>
                                <div id="subjects-container">
                                    <!-- Subjects will be added here dynamically -->
                                </div>
                            </div>
                            <div class="d-flex gap-2 mb-4 justify-content-center flex-wrap">
                                <button class="btn btn-success" id="add-subject">
                                    <i class="fas fa-plus me-2"></i>Add Subject
                                </button>
                                <button class="btn btn-warning" id="reset">
                                    <i class="fas fa-redo me-2"></i>Reset All
                                </button>
                                <button class="btn btn-info" id="export-results" style="display: none;">
                                    <i class="fas fa-download me-2"></i>Export Results
                                </button>
                            </div>
                            <div class="text-center">
                                <button class="btn btn-primary btn-lg px-5" id="calculate-btn">
                                    <span class="spinner-border spinner-border-sm me-2" id="calc-spinner"
                                        style="display: none;"></span>
                                    <i class="fas fa-calculator me-2"></i>Calculate Results
                                </button>
                            </div>
                        </div>
                        <div class="card-footer bg-light">
                            <div id="results" class="text-center"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
